name: Execute Tests & Generate Log Dashboard

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Make sure tcpdump is installed on the runner host (Ubuntu has it by default)
      - name: Install System Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y tcpdump
          pip install pytest

      - name: Run Pytest
        run: |
          pytest tests/ --continue-on-collection-errors || true

      # Generate the custom markdown table parsing both log files and pcaps
      - name: Build Markdown Summary Table
        run: |
          python -c "
          import os, re
          log_dir = 'test-logs'
          base_url = 'https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/runs/run-${{ github.run_number }}'
          
          summary_data = []
          if os.path.exists(log_dir):
              # Find all log files first
              log_files = sorted([f for f in os.listdir(log_dir) if f.endswith('.log')])
              for file in log_files:
                  base_name = file.replace('.log', '')
                  pcap_file = f'{base_name}.pcap'
                  
                  with open(os.path.join(log_dir, file), 'r') as f:
                      content = f.read()
                          
                  test_name = re.search(r'=== Test Case: (.*) ===', content).group(1)
                  outcome = re.search(r'Outcome: (.*)', content).group(1)
                  duration = re.search(r'Duration: (.*)', content).group(1)
                  
                  emoji = '✅ PASSED' if outcome == 'PASSED' else '❌ FAILED'
                  if outcome == 'SKIPPED': emoji = '⚠️ SKIPPED'
                  
                  # Create view logs button
                  log_url = f'{base_url}/{file}'
                  log_link = f'<a href=\"{log_url}\" target=\"_blank\" rel=\"noopener noreferrer\">📄 Open Logs</a>'
                  
                  # Create download PCAP link if the pcap file exists
                  if os.path.exists(os.path.join(log_dir, pcap_file)):
                      pcap_url = f'{base_url}/{pcap_file}'
                      pcap_link = f'<a href=\"{pcap_url}\" download>📦 Download PCAP</a>'
                  else:
                      pcap_link = 'N/A'
                      
                  summary_data.append(f'| `{test_name}` | {emoji} | {duration} | {log_link} | {pcap_link} |')
          
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write('## 📊 Test Case Automation Dashboard\n\n')
              f.write('| Test Case Name | Status | Duration | View Text Logs | Network Capture |\n')
              f.write('| :--- | :---: | :---: | :---: | :---: |\n')
              for row in summary_data:
                  f.write(row + '\n')
          "

      - name: Stage Artifacts for Web Hosting
        run: |
          mkdir -p web-root/runs/run-${{ github.run_number }}
          cp -r test-logs/* web-root/runs/run-${{ github.run_number }}/

      # Optional but nice: Compress a master zip archive of all pcaps for easy single downloads
      - name: Zip All Captures
        run: |
          cd test-logs && zip -q all_network_captures.zip *.pcap || true
          cp all_network_captures.zip ../web-root/runs/run-${{ github.run_number }}/ || true

       Tar it into GitHub Pages
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'web-root'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
